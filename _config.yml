name: "MuseBench"
description: "Benchmarking Intent-Level Audiovisual Arts Understanding in MLLMs"

url: https://yuxuanfanorion.github.io
baseurl: /musebench.github.io

navigation:
  - name: Home
    url: /

# The release of Jekyll Now
version: v1.2.0

# Jekyll 3 now only supports Kramdown for Markdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Set the Sass partials directory, as we're using @imports
sass:
  style: :expanded

# Use the following plug-ins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Exclude these files from your production _site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - .omc
